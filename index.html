<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0c0c12;
  color: #f0f0f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.app { width: 100%; max-width: 420px; min-height: 100vh; display: flex; flex-direction: column; }

/* API Key input screen */
.apikey-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  gap: 20px;
}
.apikey-screen h2 { font-size: 20px; font-weight: 600; text-align: center; }
.apikey-screen p { font-size: 13px; color: rgba(255,255,255,0.45); text-align: center; line-height: 1.6; }
.apikey-screen a { color: #4ade80; text-decoration: none; }
.api-input {
  width: 100%;
  background: #1a1a24;
  border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 13px 14px;
  font-size: 14px;
  color: #f0f0f0;
  outline: none;
  letter-spacing: 1px;
}
.api-input:focus { border-color: rgba(74,222,128,0.5); }
.btn-confirm {
  width: 100%;
  padding: 14px;
  background: #166534;
  color: #4ade80;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.btn-confirm:active { transform: scale(0.98); }

/* Main app */
.main-screen { display: none; flex-direction: column; flex: 1; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 10px;
  background: #16161f;
  border-bottom: 0.5px solid rgba(255,255,255,0.07);
}
.topbar-title { font-size: 16px; font-weight: 600; }
.topbar-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.toggle-wrap { display: flex; align-items: center; gap: 8px; }
.toggle-label { font-size: 12px; font-weight: 600; }
.toggle { position: relative; width: 48px; height: 26px; cursor: pointer; }
.toggle input { display: none; }
.tog-sl {
  position: absolute; inset: 0;
  background: #222230; border-radius: 13px;
  transition: 0.25s; border: 0.5px solid rgba(255,255,255,0.1);
}
.tog-sl::after {
  content: ''; position: absolute;
  left: 3px; top: 3px; width: 20px; height: 20px;
  background: #555; border-radius: 50%; transition: 0.25s;
}
.toggle input:checked ~ .tog-sl { background: #166534; }
.toggle input:checked ~ .tog-sl::after { left: 25px; background: #4ade80; }

.cam-wrap {
  position: relative; width: 100%;
  background: #000; aspect-ratio: 4/3; overflow: hidden;
}
#vid { width: 100%; height: 100%; object-fit: cover; display: block; }
#cvs { position: absolute; top:0; left:0; width:100%; height:100%; }

.off-overlay {
  position: absolute; inset: 0;
  background: #080810;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: rgba(255,255,255,0.25);
}
.off-overlay svg { opacity: 0.25; }
.off-overlay p { font-size: 13px; }

.dbadge {
  position: absolute; top: 10px; left: 10px;
  padding: 4px 11px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.3px; backdrop-filter: blur(6px);
  transition: all 0.3s;
}
.dbadge.idle { background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.35); border: 0.5px solid rgba(255,255,255,0.1); }
.dbadge.smoking { background: rgba(220,38,38,0.9); color: #fff; border: 0.5px solid #f87171; }
.dbadge.clear { background: rgba(22,163,74,0.85); color: #fff; border: 0.5px solid #4ade80; }
.dbadge.analyzing { background: rgba(234,179,8,0.85); color: #000; border: 0.5px solid #fde047; }

.timer-wrap {
  position: absolute; bottom: 10px; right: 10px;
  width: 50px; height: 50px; display: none;
}
.timer-wrap svg { transform: rotate(-90deg); }
.timer-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}

.stats {
  padding: 14px 18px;
  background: #16161f;
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.sc {
  background: #0c0c18;
  border: 0.5px solid rgba(255,255,255,0.07);
  border-radius: 9px; padding: 10px 12px;
}
.sc-l { font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 3px; letter-spacing: 0.3px; }
.sc-v { font-size: 17px; font-weight: 600; }
.cv-green { color: #4ade80; }
.cv-red { color: #f87171; }
.cv-blue { color: #60a5fa; }
.cv-muted { color: rgba(255,255,255,0.3); }

.bt-sec {
  padding: 14px 18px;
  background: #16161f;
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
}
.sec-title { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; }
.bt-row { display: flex; align-items: center; gap: 10px; }
.bt-icon {
  width: 34px; height: 34px; border-radius: 50%;
  background: #1d3557; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.bt-info { flex: 1; min-width: 0; }
.bt-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bt-st { font-size: 11px; margin-top: 1px; }
.bt-st.conn { color: #4ade80; }
.bt-st.disc { color: rgba(255,255,255,0.3); }
.btn-bt {
  padding: 8px 14px; border-radius: 8px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; border: none;
  transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
}
.btn-bt:active { transform: scale(0.96); }
.bt-default { background: #1d3557; color: #90c2f9; border: 0.5px solid #2a5298; }
.bt-connected { background: #14532d; color: #4ade80; border: 0.5px solid #166534; }
.bt-disabled { background: #111; color: rgba(255,255,255,0.2); cursor: default; border: 0.5px solid rgba(255,255,255,0.05); }

.log-sec { flex: 1; padding: 14px 18px; overflow: hidden; }
.log-list { display: flex; flex-direction: column; gap: 5px; max-height: 220px; overflow-y: auto; }
.log-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; background: #0c0c18;
  border-radius: 7px; border: 0.5px solid rgba(255,255,255,0.05);
  font-size: 12px;
}
.ld { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ld.s1 { background: #f87171; }
.ld.s0 { background: #4ade80; }
.ld.info { background: #60a5fa; }
.lt { color: rgba(255,255,255,0.28); font-size: 10px; flex-shrink: 0; }
.lm { flex: 1; color: rgba(255,255,255,0.7); }
.lv { font-weight: 700; font-size: 12px; flex-shrink: 0; }
.lv.v1 { color: #f87171; }
.lv.v0 { color: #4ade80; }

.bottom-safe { height: 16px; background: #16161f; }

/* key change btn */
.key-change { font-size: 11px; color: rgba(255,255,255,0.3); cursor: pointer; text-decoration: underline; margin-top: 4px; display: inline-block; }
</style>
</head>
<body>
<div class="app">

  <!-- API Key 입력 화면 -->
  <div class="apikey-screen" id="keyScreen">
    <div style="font-size:40px">🔑</div>
    <h2>Gemini API 키 입력</h2>
    <p>
      무료로 사용 가능합니다.<br>
      <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> 에서 발급받으세요.<br><br>
      키는 이 기기에서만 사용되며 외부로 전송되지 않습니다.
    </p>
    <input class="api-input" id="apiKeyInput" type="password" placeholder="AIza..." autocomplete="off">
    <button class="btn-confirm" onclick="confirmKey()">시작하기</button>
  </div>

  <!-- 메인 앱 -->
  <div class="main-screen" id="mainScreen">

    <div class="topbar">
      <div>
        <div class="topbar-title">🚬 흡연 감지 시스템</div>
        <div class="topbar-sub">Gemini Flash · 무료 · 1분 주기</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label" id="togLabel">OFF</span>
        <label class="toggle">
          <input type="checkbox" id="mainToggle">
          <span class="tog-sl"></span>
        </label>
      </div>
    </div>

    <div class="cam-wrap">
      <video id="vid" autoplay playsinline muted></video>
      <canvas id="cvs"></canvas>
      <div class="off-overlay" id="offOv">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15 10l4.553-2.669A1 1 0 0121 8.232v7.536a1 1 0 01-1.447.899L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          <line x1="3" y1="3" x2="21" y2="21" stroke-width="1.5"/>
        </svg>
        <p>토글을 켜서 시작하세요</p>
      </div>
      <div class="dbadge idle" id="dbadge">대기 중</div>
      <div class="timer-wrap" id="timerWrap">
        <svg width="50" height="50" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="21" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
          <circle cx="25" cy="25" r="21" fill="none" stroke="#60a5fa" stroke-width="4"
            stroke-dasharray="131.9" stroke-dashoffset="0" id="timerArc" stroke-linecap="round"/>
        </svg>
        <div class="timer-num" id="timerNum">60</div>
      </div>
    </div>

    <div class="stats">
      <div class="sc"><div class="sc-l">상태</div><div class="sc-v cv-muted" id="stStatus">비활성</div></div>
      <div class="sc"><div class="sc-l">마지막 전송</div><div class="sc-v cv-blue" id="stLast">—</div></div>
      <div class="sc"><div class="sc-l">총 전송</div><div class="sc-v cv-blue" id="stTotal">0</div></div>
      <div class="sc"><div class="sc-l">흡연 감지</div><div class="sc-v cv-red" id="stSmoke">0</div></div>
    </div>

    <div class="bt-sec">
      <div class="sec-title">블루투스</div>
      <div class="bt-row">
        <div class="bt-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#60a5fa">
            <path d="M12 2l4 4-4 4V2zm0 12l4 4-4 4v-8zm-4-4l4-4v8l-4-4zm8 0l-4-4v8l4-4z"/>
          </svg>
        </div>
        <div class="bt-info">
          <div class="bt-name" id="btName">연결된 기기 없음</div>
          <div class="bt-st disc" id="btSt">연결 안 됨</div>
        </div>
        <button class="btn-bt bt-default" id="btBtn" onclick="handleBT()">기기 선택</button>
      </div>
    </div>

    <div class="log-sec">
      <div class="sec-title">
        전송 로그
        <span class="key-change" onclick="changeKey()">(API 키 변경)</span>
      </div>
      <div class="log-list" id="logList">
        <div class="log-item">
          <div class="ld info"></div>
          <span class="lm">앱 시작됨</span>
          <span class="lt" id="initT"></span>
        </div>
      </div>
    </div>

    <div class="bottom-safe"></div>
  </div>
</div>

<script>
const CIRC = 2 * Math.PI * 21;
let apiKey = '';
let isOn = false;
let stream = null;
let btDevice = null, btChar = null;
let countdown = 60;
let cdTimer = null;
let totalSent = 0, smokeCount = 0;
let analyzing = false;

const vid = document.getElementById('vid');
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const offOv = document.getElementById('offOv');
const dbadge = document.getElementById('dbadge');
const timerWrap = document.getElementById('timerWrap');
const timerArc = document.getElementById('timerArc');
const timerNum = document.getElementById('timerNum');
const stStatus = document.getElementById('stStatus');
const stLast = document.getElementById('stLast');
const stTotal = document.getElementById('stTotal');
const stSmoke = document.getElementById('stSmoke');
const btBtn = document.getElementById('btBtn');
const btName = document.getElementById('btName');
const btSt = document.getElementById('btSt');
const logList = document.getElementById('logList');
const togLabel = document.getElementById('togLabel');
const togEl = document.getElementById('mainToggle');

document.getElementById('initT').textContent = nowStr();

function nowStr() {
  return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function confirmKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k.startsWith('AIza') || k.length < 30) {
    alert('올바른 Gemini API 키를 입력해주세요.\n(AIza... 로 시작해야 합니다)');
    return;
  }
  apiKey = k;
  document.getElementById('keyScreen').style.display = 'none';
  const ms = document.getElementById('mainScreen');
  ms.style.display = 'flex';
  ms.style.flexDirection = 'column';
}

function changeKey() {
  stopSystem();
  togEl.checked = false;
  togLabel.textContent = 'OFF';
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('keyScreen').style.display = 'flex';
  document.getElementById('apiKeyInput').value = '';
  apiKey = '';
}

togEl.addEventListener('change', async () => {
  isOn = togEl.checked;
  togLabel.textContent = isOn ? 'ON' : 'OFF';
  if (isOn) await startSystem();
  else stopSystem();
});

async function startSystem() {
  offOv.style.display = 'none';
  timerWrap.style.display = 'block';
  setStatus('실행 중', 'cv-green');
  dbadge.className = 'dbadge idle';
  dbadge.textContent = '카메라 시작 중…';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { cvs.width = vid.videoWidth; cvs.height = vid.videoHeight; };
    dbadge.className = 'dbadge idle';
    dbadge.textContent = '탐지 대기';
    addLog('카메라 시작됨', 'info');
    startCountdown();
  } catch(e) {
    addLog('카메라 오류: ' + e.message, 'info');
    dbadge.textContent = '카메라 오류';
  }
}

function stopSystem() {
  clearInterval(cdTimer);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  offOv.style.display = 'flex';
  timerWrap.style.display = 'none';
  dbadge.className = 'dbadge idle';
  dbadge.textContent = '대기 중';
  setStatus('비활성', 'cv-muted');
  addLog('시스템 정지', 'info');
}

function startCountdown() {
  countdown = 60;
  updateArc();
  clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    countdown--;
    updateArc();
    if (countdown <= 0) { clearInterval(cdTimer); runAnalysis(); }
  }, 1000);
}

function updateArc() {
  timerNum.textContent = countdown;
  const pct = countdown / 60;
  timerArc.style.strokeDashoffset = CIRC * (1 - pct);
  timerArc.style.stroke = pct > 0.3 ? '#60a5fa' : '#f87171';
}

async function runAnalysis() {
  if (!isOn || analyzing) { startCountdown(); return; }
  analyzing = true;
  dbadge.className = 'dbadge analyzing';
  dbadge.textContent = 'AI 분석 중…';
  setStatus('분석 중', 'cv-green');

  const result = await analyzeWithGemini();
  analyzing = false;
  const val = result ? 1 : 0;
  totalSent++;
  if (val === 1) smokeCount++;
  stTotal.textContent = totalSent;
  stSmoke.textContent = smokeCount;
  stLast.textContent = nowStr();

  if (val === 1) {
    dbadge.className = 'dbadge smoking';
    dbadge.textContent = '🚬 흡연 감지됨';
    addLog('흡연 감지됨', 'smoke', 1);
  } else {
    dbadge.className = 'dbadge clear';
    dbadge.textContent = '✅ 흡연 없음';
    addLog('흡연 없음', 'clear', 0);
  }
  await sendBT(val);
  startCountdown();
}

async function analyzeWithGemini() {
  try {
    cvs.width = vid.videoWidth || 640;
    cvs.height = vid.videoHeight || 480;
    ctx.drawImage(vid, 0, 0);
    const b64 = cvs.toDataURL('image/jpeg', 0.75).split(',')[1];

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              {
                inline_data: { mime_type: 'image/jpeg', data: b64 }
              },
              {
                text: '이 이미지에 담배를 피우고 있는 사람이 있습니까? 담배 연기, 담배를 입에 물거나 손에 든 모습이 있으면 YES, 없으면 NO 라고만 답하세요. 다른 말은 하지 마세요.'
              }
            ]
          }],
          generationConfig: { maxOutputTokens: 10, temperature: 0 }
        })
      }
    );
    const data = await res.json();
    if (data.error) { addLog('API 오류: ' + data.error.message, 'info'); return false; }
    const text = (data.candidates?.[0]?.content?.parts?.[0]?.text || '').trim().toUpperCase();
    return text.includes('YES');
  } catch(e) {
    addLog('네트워크 오류: ' + e.message, 'info');
    return false;
  }
}

async function sendBT(val) {
  if (!btChar) { addLog('BT 미연결 — 로컬 기록만', 'info'); return; }
  try {
    await btChar.writeValue(new Uint8Array([val]));
    addLog('BT 전송 완료', 'info', val);
  } catch(e) {
    addLog('BT 전송 오류: ' + e.message, 'info');
  }
}

async function handleBT() {
  if (!navigator.bluetooth) {
    alert('Web Bluetooth 미지원\nAndroid Chrome에서 실행해주세요.');
    return;
  }
  if (btDevice && btDevice.gatt.connected) {
    btDevice.gatt.disconnect();
    resetBT();
    addLog('블루투스 연결 해제', 'info');
    return;
  }
  try {
    btBtn.textContent = '검색 중…';
    btBtn.className = 'btn-bt bt-disabled';
    btDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        '0000ffe0-0000-1000-8000-00805f9b34fb',
        '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
      ]
    });
    btName.textContent = btDevice.name || '알 수 없는 기기';
    btBtn.textContent = '연결 중…';
    addLog('기기 선택: ' + (btDevice.name || '?'), 'info');
    const server = await btDevice.gatt.connect();
    const services = await server.getPrimaryServices();
    let found = null;
    for (const svc of services) {
      try {
        const chars = await svc.getCharacteristics();
        for (const c of chars) {
          if (c.properties.write || c.properties.writeWithoutResponse) { found = c; break; }
        }
        if (found) break;
      } catch {}
    }
    btChar = found;
    btSt.textContent = found ? '✓ 연결됨 (쓰기 가능)' : '연결됨 (쓰기 불가)';
    btSt.className = 'bt-st conn';
    btBtn.textContent = '연결 해제';
    btBtn.className = 'btn-bt bt-connected';
    btDevice.addEventListener('gattserverdisconnected', () => { resetBT(); addLog('BT 연결 끊김', 'info'); });
    addLog('BT 연결 성공: ' + (btDevice.name || '?'), 'info');
  } catch(e) {
    btBtn.textContent = '기기 선택';
    btBtn.className = 'btn-bt bt-default';
    if (e.name !== 'NotFoundError') addLog('BT 오류: ' + e.message, 'info');
    else addLog('기기 선택 취소', 'info');
  }
}

function resetBT() {
  btDevice = null; btChar = null;
  btName.textContent = '연결된 기기 없음';
  btSt.textContent = '연결 안 됨';
  btSt.className = 'bt-st disc';
  btBtn.textContent = '기기 선택';
  btBtn.className = 'btn-bt bt-default';
}

function setStatus(txt, cls) {
  stStatus.textContent = txt;
  stStatus.className = 'sc-v ' + cls;
}

function addLog(msg, type, val) {
  const item = document.createElement('div');
  item.className = 'log-item';
  const dc = type === 'smoke' ? 's1' : type === 'clear' ? 's0' : 'info';
  item.innerHTML = `
    <div class="ld ${dc}"></div>
    <span class="lm">${msg}</span>
    ${val !== undefined ? `<span class="lv ${val===1?'v1':'v0'}">${val===1?'📡 1':'📡 0'}</span>` : ''}
    <span class="lt">${nowStr()}</span>
  `;
  logList.insertBefore(item, logList.firstChild);
  while (logList.children.length > 15) logList.removeChild(logList.lastChild);
}
</script>
</body>
</html>
